<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>待办任务管理</title>
    <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css"/>
    <link rel="stylesheet" href="/app/admin/admin/css/reset.css"/>
    <style>
        .layui-table-cell {
            height: auto !important;
            line-height: 24px !important;
            white-space: normal !important;
            word-break: break-all !important;
        }

        .layui-table {
            width: 100% !important;
        }
    </style>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" action="">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">任务名称</label>
                    <div class="layui-input-inline">
                        <input type="text" name="node_name" id="node_name" placeholder="请输入任务名称"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">流程状态</label>
                    <div class="layui-input-inline">
                        <select name="flow_status" id="flow_status" lay-filter="flow_status">
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">创建时间</label>
                    <div class="layui-input-inline">
                        <input type="text" name="create_time" id="create_time" placeholder="选择创建时间"
                               class="layui-input" readonly>
                    </div>
                </div>
                <div class="layui-inline">
                    <button type="button" class="pear-btn pear-btn-primary pear-btn-sm" id="search">搜索</button>
                    <button type="button" class="pear-btn pear-btn-sm" id="reset">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="layui-card">
    <div class="layui-card-body">
        <table id="todoTable" lay-filter="todoTable"></table>
    </div>
</div>

<script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
<script src="/app/admin/component/pear/pear.js"></script>
<script src="/app/yflow/api/flow/execute.js"></script>
<script src="/app/yflow/api/flow/flowDict.js"></script>

<script>
    layui.use(['table', 'layer', 'form', 'laydate', 'popup', 'select'], function () {
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;
        var laydate = layui.laydate;
        var $ = layui.$;

        // 初始化日期选择器
        laydate.render({
            elem: '#create_time',
            type: 'datetime',
            format: 'yyyy-MM-dd HH:mm:ss'
        });

        // 初始化流程状态下拉框
        FlowDict.initFlowStatusSelect('flow_status');

        // 表格初始化
        var tableIns = table.render({
            elem: '#todoTable',
            url: ExecuteApi.toDoPageUrl,
            method: 'get',
            page: true,
            size: 'sm',
            limit: 10,
            limits: [10, 20, 30, 40, 50],
            cellMinWidth: 80,
            autoSort: false,
            autoRowHeight: true,
            height: 'full-200',
            cols: [[
                {type: 'checkbox', width: 50, align: 'center'},
                {type: 'numbers', title: '序号', align: 'center'},
                {field: 'id', title: 'ID', width: 100, align: 'center'},
                {
                    field: 'flow_name', title: '流程名称', align: 'center', templet: function (d) {
                        return d?.definition?.flow_name || '-';
                    }
                },
                {field: 'node_name', title: '任务名称', align: 'center'},
                {field: 'approver', title: '审批人', align: 'center'},
                {field: 'transferred_by', title: '转办人', align: 'center'},
                {field: 'delegate', title: '委派人', align: 'center'},
                {
                    field: 'flow_status', title: '流程状态', align: 'center', templet: function (d) {
                        return FlowDict.flowStatusMap(d.flow_status);
                    }
                },
                {
                    field: 'activity_status', title: '激活状态', align: 'center', templet: function (d) {
                        return d?.instance?.activity_status === 1 ? '<span class="layui-badge layui-bg-green">已激活</span>' : '<span class="layui-badge layui-bg-gray">已挂起</span>';
                    }
                },
                {field: 'create_time', title: '创建时间', width: 160, align: 'center'},
                {
                    field: 'action', title: '操作', width: 200, align: 'center', templet: function (d) {
                        var html = '<div style="line-height:24px;word-break:break-all;white-space:normal;">';
                        html += '<a href="javascript:;" lay-event="handle" style="margin:0 5px;display:inline-block;color:#1E9FFF;">办理</a>';
                        html += '<a href="javascript:;" lay-event="anyJump" style="margin:0 5px;display:inline-block;color:#1E9FFF;">任意跳转</a>';
                        html += '<a href="javascript:;" lay-event="transfer" style="margin:0 5px;display:inline-block;color:#5FB878;">转办</a>';
                        html += '<a href="javascript:;" lay-event="addSign" style="margin:0 5px;display:inline-block;color:#5FB878;">加签</a>';
                        html += '<a href="javascript:;" lay-event="delegate" style="margin:0 5px;display:inline-block;color:#5FB878;">委派</a>';
                        html += '<a href="javascript:;" lay-event="removeSign" style="margin:0 5px;display:inline-block;color:#5FB878;">减签</a>';
                        if (d?.instance?.activity_status === 0) {
                            html += '<a href="javascript:;" lay-event="active" style="margin:0 5px;display:inline-block;color:#1AA094;">激活</a>';
                        } else {
                            html += '<a href="javascript:;" lay-event="unActive" style="margin:0 5px;display:inline-block;color:#1AA094;">挂起</a>';
                        }
                        html += '<a href="javascript:;" lay-event="viewFlow" style="margin:0 5px;display:inline-block;color:#1E9FFF;">流程图</a>';
                        html += '</div>';
                        return html;
                    }
                }
            ]],
            done: function (res, curr, count) {
                // 表格渲染完成后的回调
            }
        });

        // 搜索
        $('#search').on('click', function () {
            var nodeName = $('#node_name').val();
            var flowStatus = $('#flow_status').val();
            var createTime = $('#create_time').val();

            var query = {
                nodeName: nodeName,
                flowStatus: flowStatus,
                createTime: createTime,
            };

            tableIns.reload({
                where: query,
                page: {
                    curr: 1
                }
            });
        });

        // 重置
        $('#reset').on('click', function () {
            $('#node_name').val('');
            $('#flow_status').val('');
            $('#create_time').val('');
            form.render();
            window.refreshTable();
        });

        // 表格事件
        table.on('tool(todoTable)', function (obj) {
            var data = obj.data;
            var layEvent = obj.event;

            if (layEvent === 'handle') {
                let row = data;
                let showAnyNode = false; // 默认不显示任意跳转
                let url = '/app/yflow/execute/handle?task_id=' + row.id + '&business_id=' + (row?.instance?.business_id || '') + '&show_any_node=' + showAnyNode
                layer.open({
                    type: 2,
                    title: '任务办理',
                    content: url,
                    area: ['800px', '600px'],
                    shadeClose: true
                });
            } else if (layEvent === 'anyJump') {
                // 任意跳转
                let row = data;
                let showAnyNode = true; // 默认不显示任意跳转
                let url = '/app/yflow/execute/handle?task_id=' + row.id + '&business_id=' + (row?.instance?.business_id || '') + '&show_any_node=' + showAnyNode
                layer.open({
                    type: 2,
                    title: '任意跳转',
                    content: url,
                    area: ['800px', '600px'],
                    shadeClose: true
                });
            } else if (layEvent === 'transfer') {
                // 转办
                showUserSelectDialog(data.id, '转办', '2');
            } else if (layEvent === 'addSign') {
                // 加签
                showUserSelectDialog(data.id, '加签', '6');
            } else if (layEvent === 'delegate') {
                // 委派
                showUserSelectDialog(data.id, '委派', '3');
            } else if (layEvent === 'removeSign') {
                // 减签
                showUserSelectDialog(data.id, '减签', '7');
            } else if (layEvent === 'active') {
                // 激活
                layer.confirm('是否确认激活流程编号为"' + data.instance_id + '"的数据项？', function (index) {
                    ExecuteApi.active(data.instance_id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('激活成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'unActive') {
                // 挂起
                layer.confirm('是否确认挂起流程编号为"' + data.instance_id + '"的数据项？', function (index) {
                    ExecuteApi.unActive(data.instance_id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('挂起成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'viewFlow') {
                // 查看流程图
                parent.layer.open({
                    type: 2,
                    title: '流程图',
                    content: '/app/yflow/definition/chart?insId=' + data.instance_id + '&disabled=true',
                    area: ['85%', '70%'],
                    shadeClose: true
                });
            }
        });

        // 显示用户选择对话框
        function showUserSelectDialog(taskId, title, operatorType) {
            // 跳转到用户选择页面
            var selectedUsers = ''; // 已选用户，可以传递
            layer.open({
                type: 2,
                title: title + '用户选择',
                content: '/app/yflow/execute/selectUser?type=' + encodeURIComponent(title) + '&taskId=' + taskId + '&operatorType=' + operatorType + '&selected=' + selectedUsers,
                area: ['800px', '600px'],
                shadeClose: true
            });
        }

        // 刷新表格数据
        window.refreshTable = function () {
            table.reloadData("todoTable", {
                scrollPos: "fixed",
                done: function (res, curr) {
                    if (curr > 1 && res.data && !res.data.length) {
                        curr = curr - 1;
                        table.reloadData("todoTable", {
                            page: {
                                curr: curr
                            },
                        })
                    }
                }
            });
        }
    });
</script>

</body>
</html>
