<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>审批记录</title>
    <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css"/>
    <link rel="stylesheet" href="/app/admin/admin/css/reset.css"/>
    <style>
        .layui-table-cell {
            height: auto !important;
            line-height: 24px !important;
            white-space: normal !important;
            word-break: break-all !important;
        }

        .layui-table {
            width: 100% !important;
        }
    </style>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <table id="doneListTable" lay-filter="doneListTable"></table>
    </div>
</div>

<script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
<script src="/app/admin/component/pear/pear.js"></script>
<script src="/app/yflow/api/flow/execute.js"></script>
<script src="/app/yflow/api/flow/flowDict.js"></script>

<script>
    layui.use(['table', 'layer', 'form', 'popup'], function () {
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;
        var $ = layui.$;

        // 获取URL参数
        function getUrlParam(name) {
            return layui.url().search[name]
        }

        var instance_id = getUrlParam('instance_id');

        // 表格初始化
        var tableIns = table.render({
            elem: '#doneListTable',
            url: '/app/yflow/execute/doneList?instance_id=' + instance_id,
            method: 'get',
            page: false,
            size: 'sm',
            cellMinWidth: 80,
            autoSort: false,
            autoRowHeight: true,
            height: 'full-200',
            cols: [[
                {type: 'numbers', title: '序号', width: 80, align: 'center'},
                {field: 'node_name', title: '开始节点名称', align: 'center'},
                {field: 'target_node_name', title: '结束节点名称', align: 'center'},
                {field: 'approver', title: '审批人', align: 'center'},

                {
                    field: 'cooperate_type', title: '协作类型', align: 'center', templet: function (d) {
                        return FlowDict.cooperateTypeMap(d.cooperate_type);
                    }
                },
                {field: 'collaborator', title: '协作人', align: 'center'},
                {
                    field: 'flow_status', title: '流程状态', align: 'center', templet: function (d) {
                        return FlowDict.flowStatusMap(d.flow_status);
                    }
                },

                {field: 'message', title: '审批意见', align: 'center'},
                {field: 'create_time', title: '创建时间', width: 160, align: 'center'},
                {
                    field: 'action', title: '业务详情', width: 100, align: 'center', templet: function (d) {
                        var html = '';
                        if (d.ext) {
                            html += '<a href="javascript:;" lay-event="viewDetail" style="margin:0 5px;display:inline-block;color:#1E9FFF;">查看</a>';
                        }
                        return html;
                    }
                }
            ]],
            done: function (res, curr, count) {
                // 表格渲染完成后的回调
            }
        });

        // 表格事件
        table.on('tool(doneListTable)', function (obj) {
            var data = obj.data;
            var layEvent = obj.event;

            if (layEvent === 'viewDetail') {
                // 查看详情
                if (data.ext) {
                    try {
                        var extData = JSON.parse(data.ext);
                        layer.open({
                            type: 1,
                            title: '业务详情',
                            content: '<div style="padding:20px;">' + JSON.stringify(extData, null, 2) + '</div>',
                            area: ['600px', '400px'],
                            shadeClose: true
                        });
                    } catch (e) {
                        layui.popup.failure('详情数据格式错误');
                    }
                }
            }
        });
    });
</script>
</body>
</html>
