<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>流程定义管理</title>
    <link rel="stylesheet" href="/app/admin/component/pear/css/pear.css"/>
    <link rel="stylesheet" href="/app/admin/admin/css/reset.css"/>
    <style>
        .layui-table-cell {
            height: auto !important;
            line-height: 24px !important;
            white-space: normal !important;
            word-break: break-all !important;
        }

        .layui-table {
            width: 100% !important;
        }
    </style>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" action="">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">流程编码</label>
                    <div class="layui-input-inline">
                        <input type="text" name="flowCode" id="flowCode" placeholder="请输入流程编码"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">流程名称</label>
                    <div class="layui-input-inline">
                        <input type="text" name="flowName" id="flowName" placeholder="请输入流程名称"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">流程类别</label>
                    <div class="layui-input-inline">
                        <input type="text" name="category" id="category" placeholder="请输入流程类别"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">流程版本</label>
                    <div class="layui-input-inline">
                        <input type="text" name="version" id="version" placeholder="请输入流程版本" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <button type="button" class="pear-btn pear-btn-primary pear-btn-sm" id="search">搜索</button>
                    <button type="button" class="pear-btn pear-btn-sm" id="reset">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="layui-card">
    <div class="layui-card-body">
        <div class="layui-btn-group">
            <button type="button" class="pear-btn pear-btn-primary pear-btn-sm" id="add2" style="margin-right: 10px;">
                新增
            </button>
            <button type="button" class="pear-btn pear-btn-primary pear-btn-sm" id="import">导入流程定义</button>
        </div>

        <table id="definitionTable" lay-filter="definitionTable"></table>
    </div>
</div>

<!-- 导入对话框 -->
<div id="importDialog" style="display: none;">
    <div class="layui-upload-drag" id="uploader" style="display: block;">
        <i class="layui-icon layui-icon-upload"></i>
        <div class="layui-upload-text">
            <p>将文件拖到此处，或</p>
            <p>
                <button type="button" class="pear-btn pear-btn-primary pear-btn-sm">点击上传</button>
            </p>
        </div>
        <div class="layui-upload-tips">仅允许导入json格式文件</div>
    </div>
</div>

<!-- 流程图查看对话框 -->
<div id="flowChartDialog" style="display: none;">
    <img id="flowChartImg" width="100%" style="margin:0 auto"/>
</div>

<script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
<script src="/app/admin/component/pear/pear.js"></script>
<script src="/app/yflow/api/flow/definition.js"></script>
<script>
    layui.use(['table', 'layer', 'form', 'upload', 'popup'], function () {
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;
        var upload = layui.upload;
        var $ = layui.$;

        // 表格初始化
        var tableIns = table.render({
            elem: '#definitionTable',
            url: DefinitionApi.listUrl,
            method: 'get',
            page: true,
            size: 'sm',
            limit: 10,
            limits: [10, 20, 30, 40, 50],
            cellMinWidth: 80,
            autoSort: false,
            autoRowHeight: true,
            height: 'full-200',
            cols: [[
                {type: 'checkbox', width: 50, align: 'center'},
                {type: 'numbers', title: '序号', width: 80, align: 'center'},
                {field: 'flow_code', title: '流程编码', width: 150, align: 'center', sort: true},
                {field: 'flow_name', title: '流程名称', align: 'center', sort: true},
                {
                    field: 'version',
                    title: '流程版本',
                    width: 100,
                    align: 'center',
                    sort: true,
                    templet: function (d) {
                        return '<span class="layui-badge">' + d.version + '</span>';
                    }
                },
                {
                    field: 'model_value', title: '设计器模型', align: 'center', sort: true, templet: function (d) {
                        if (d.model_value === 'CLASSICS') {
                            return '<span class="layui-badge layui-bg-blue">经典模型</span>';
                        } else if (d.model_value === 'MIMIC') {
                            return '<span class="layui-badge layui-bg-green">仿钉钉模型</span>';
                        } else {
                            return d.model_value;
                        }
                    }
                },
                {field: 'category', title: '流程类别', align: 'center', sort: true},
                {
                    field: 'is_publish',
                    title: '是否发布',
                    width: 120,
                    align: 'center',
                    sort: true,
                    templet: function (d) {
                        return d.is_publish === 1 ? '<span class="layui-badge layui-bg-green">已发布</span>' : '<span class="layui-badge layui-bg-gray">未发布</span>';
                    }
                },
                {
                    field: 'activity_status',
                    title: '激活状态',
                    width: 120,
                    align: 'center',
                    sort: true,
                    templet: function (d) {
                        return d.activity_status === 1 ? '<span class="layui-badge layui-bg-green">已激活</span>' : '<span class="layui-badge layui-bg-gray">已挂起</span>';
                    }
                },
                {field: 'create_time', title: '创建时间', width: 160, align: 'center', sort: true},
                {
                    field: 'action', title: '操作', minWidth: 200, align: 'center', templet: function (d) {
                        var html = '<div style="line-height:24px;word-break:break-all;white-space:normal;">';
                        if (d.is_publish === 0) {
                            html += '<a href="javascript:;" lay-event="update" style="margin:0 5px;display:inline-block;color:#1E9FFF;">修改</a>';
                        }
                        html += '<a href="javascript:;" lay-event="design1" style="margin:0 5px;display:inline-block;color:#5FB878;">流程设计①</a>';
                        html += '<a href="javascript:;" lay-event="design2" style="margin:0 5px;display:inline-block;color:#5FB878;">流程设计②</a>';
                        html += '<a href="javascript:;" lay-event="view1" style="margin:0 5px;display:inline-block;color:#1E9FFF;">查看流程图①</a>';
                        html += '<a href="javascript:;" lay-event="view2" style="margin:0 5px;display:inline-block;color:#1E9FFF;">查看流程图②</a>';
                        if (d.is_publish === 0) {
                            html += '<a href="javascript:;" lay-event="publish" style="margin:0 5px;display:inline-block;color:#FFB800;">发布</a>';
                        } else {
                            html += '<a href="javascript:;" lay-event="unPublish" style="margin:0 5px;display:inline-block;color:#FFB800;">取消发布</a>';
                        }
                        if (d.activity_status === 0) {
                            html += '<a href="javascript:;" lay-event="active" style="margin:0 5px;display:inline-block;color:#1AA094;">激活</a>';
                        } else {
                            html += '<a href="javascript:;" lay-event="unActive" style="margin:0 5px;display:inline-block;color:#1AA094;">挂起</a>';
                        }
                        html += '<a href="javascript:;" lay-event="copy" style="margin:0 5px;display:inline-block;color:#1E9FFF;">复制流程</a>';
                        html += '<a href="javascript:;" lay-event="export" style="margin:0 5px;display:inline-block;color:#1E9FFF;">导出流程</a>';
                        if (d.is_publish === 0) {
                            html += '<a href="javascript:;" lay-event="delete" style="margin:0 5px;display:inline-block;color:#FF5722;">删除</a>';
                        }
                        html += '</div>';
                        return html;
                    }
                }
            ]],
            done: function (res, curr, count) {
                // 表格渲染完成后的回调
            }
        });

        // 搜索
        $('#search').on('click', function () {
            var flowCode = $('#flowCode').val();
            var flowName = $('#flowName').val();
            var category = $('#category').val();
            var version = $('#version').val();

            var query = {
                flowCode: flowCode,
                flowName: flowName,
                category: category,
                version: version,
            };

            tableIns.reload({
                where: query,
                page: {
                    curr: 1
                }
            });
        });

        // 重置
        $('#reset').on('click', function () {
            $('#flowCode').val('');
            $('#flowName').val('');
            $('#category').val('');
            $('#version').val('');
            form.render();
            window.refreshTable();
        });

        // 新增②
        $('#add2').on('click', function () {
            // 打开对话框
            layer.open({
                type: 2,
                title: '新增流程定义',
                content: '/app/yflow/definition/insert',
                area: ['800px', '600px'],
                btn: [],
                shadeClose: true
            });
        });

        // 导入
        $('#import').on('click', function () {
            layer.open({
                type: 1,
                title: '导入流程定义',
                shadeClose: true,
                content: $('#importDialog'),
                area: ['500px', '350px'],
                btn: ['确定', '取消'],
                yes: function (index, layero) {
                    uploadInst.upload();
                }
            });
        });

        // 上传实例
        var uploadInst = upload.render({
            elem: '#uploader',
            url: '/app/yflow/definition/importDefinition',
            accept: 'file',
            exts: 'json',
            multiple: false,
            auto: false,
            bindAction: '#uploader .pear-btn',
            done: function (res) {
                if (res.code === 0) {
                    layer.closeAll();
                    tableIns.reload();
                    layui.popup.success('导入成功');
                } else {
                    layui.popup.failure(res.msg);
                }
            },
            error: function () {
                layui.popup.failure('上传失败');
            }
        });

        // 表格事件
        table.on('tool(definitionTable)', function (obj) {
            var data = obj.data;
            var layEvent = obj.event;

            if (layEvent === 'update') {
                // 修改
                layer.open({
                    type: 2,
                    title: '修改流程定义',
                    shadeClose: true,
                    content: '/app/yflow/definition/update?id=' + data.id,
                    area: ['800px', '600px'],
                    btn: [],
                    shadeClose: true
                });
            } else if (layEvent === 'design1') {
                // 流程设计①
                parent.layui.admin.addTab('flow-design-' + data.id, '流程设计', '/app/yflow/definition/design?id=' + data.id)
            } else if (layEvent === 'design2') {
                // 流程设计②
                parent.layui.admin.addTab('flow-design-' + data.id + '-2', '流程设计', '/app/yflow/definition/design?id=' + data.id + '&onlyDesignShow=true')
            } else if (layEvent === 'view1') {
                // 查看流程图①
                parent.layui.admin.addTab('flow-design-view-' + data.id, '查看流程图', '/app/yflow/definition/design?id=' + data.id + '&disabled=true')
            } else if (layEvent === 'view2') {
                // 查看流程图②
                parent.layui.admin.addTab('flow-design-view-' + data.id + '-2', '查看流程图', '/app/yflow/definition/design?id=' + data.id + '&onlyDesignShow=true&disabled=true')
            } else if (layEvent === 'publish') {
                // 发布
                layer.confirm('是否确认发布流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.publish(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('发布成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'unPublish') {
                // 取消发布
                layer.confirm('是否确认取消发布流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.unPublish(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('取消发布成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'active') {
                // 激活
                layer.confirm('是否确认激活流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.active(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('激活成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'unActive') {
                // 挂起
                layer.confirm('是否确认挂起流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.unActive(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('挂起成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'copy') {
                // 复制流程
                layer.confirm('是否确认复制流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.copyDef(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('复制成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            } else if (layEvent === 'export') {
                // 导出流程
                DefinitionApi.exportDefinition(data.id);
            } else if (layEvent === 'delete') {
                // 删除
                layer.confirm('是否确认删除流程定义编号为"' + data.id + '"的数据项？', function (index) {
                    DefinitionApi.delDefinition(data.id, function (res) {
                        if (res.code === 0) {
                            layer.close(index);
                            tableIns.reload();
                            layui.popup.success('删除成功');
                        } else {
                            layui.popup.failure(res.msg);
                        }
                    });
                });
            }
        });

        // 刷新表格数据
        window.refreshTable = function () {
            table.reloadData("definitionTable", {
                scrollPos: "fixed",
                done: function (res, curr) {
                    if (curr > 1 && res.data && !res.data.length) {
                        curr = curr - 1;
                        table.reloadData("definitionTable", {
                            page: {
                                curr: curr
                            },
                        })
                    }
                }
            });
        }
    });
</script>
</body>
</html>
